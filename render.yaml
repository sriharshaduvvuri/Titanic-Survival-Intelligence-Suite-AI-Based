services:
  # FastAPI backend service configuration
  - type: web
    name: titanic-suite-backend
    env: python
    buildCommand: "cd backend && python -m venv venv && venv/bin/pip install -r requirements.txt"
    startCommand: "cd backend && venv/bin/python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true

  # React frontend static service configuration
  - type: web
    name: titanic-suite-frontend
    env: static
    buildCommand: "cd frontend && npm install --legacy-peer-deps && npm run build"
    staticPublishPath: "frontend/dist"
    headers:
      - key: Access-Control-Allow-Origin
        value: "*"
    routes:
      - type: rewrite
        path: "/*"
        destination: "/index.html"
python -m uvicorn main:app --reload